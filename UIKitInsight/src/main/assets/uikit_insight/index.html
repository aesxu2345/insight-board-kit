<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>UIKitInsight</title>
    <link rel="stylesheet" href="./uikit-insight.css" />
    <style>
      :root {
        --green: #198f47;
        --green-dark: #0b6d36;
        --green-soft: #e9f6ee;
        --page: #f8fbf7;
        --header-max: 190px;
        --content-overlap: 18px;
        --side-gutter: 48px;
        --panel-max: 620px;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        background: var(--page);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
        -webkit-text-size-adjust: 100%;
        -webkit-focus-ring-color: transparent;
        text-rendering: optimizeLegibility;
      }

      html,
      body,
      .page {
        min-height: 100vh;
      }

      body {
        margin: 0;
        overflow: hidden;
        touch-action: none;
      }

      button {
        appearance: none;
        -webkit-appearance: none;
        border: 0;
        padding: 0;
        font: inherit;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      button:focus,
      button:focus-visible,
      button:active,
      a:focus,
      a:focus-visible,
      [tabindex]:focus,
      [tabindex]:focus-visible {
        outline: none;
        box-shadow: none;
      }

      .page {
        --header-height: var(--header-max);
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% -12%, rgba(255, 255, 255, .86) 0, rgba(255, 255, 255, 0) 30%),
          linear-gradient(180deg, #fbfdfb 0%, #f6fbf7 100%);
      }

      #header {
        --header-height: var(--header-max);
        height: var(--header-max);
      }

      .green-header {
        position: relative;
        z-index: 1;
        width: 100%;
        min-height: 88px;
        overflow: hidden;
        color: #fff;
        background:
          radial-gradient(circle at 38% 18%, rgba(102, 210, 132, .95) 0%, rgba(45, 164, 78, .88) 36%, rgba(20, 128, 61, 1) 100%),
          linear-gradient(135deg, #62d584 0%, #168140 100%);
      }

      .green-header::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 36% 18%, rgba(255, 255, 255, .18), rgba(255, 255, 255, 0) 34%),
          linear-gradient(to bottom, rgba(255, 255, 255, .08), rgba(255, 255, 255, 0) 48%);
      }

      .green-header::after {
        content: none !important;
        display: none !important;
      }

      .header-wave {
        position: absolute;
        left: 0;
        right: 0;
        bottom: -1px;
        z-index: 1;
        width: 100%;
        height: 118px;
        pointer-events: none;
      }

      .ornament {
        opacity: .13;
        stroke: currentColor;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .building-window {
        fill: currentColor;
        opacity: .45;
      }

      .header-primary {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 3;
        transition: opacity 90ms linear;
      }

      .nav-row {
        position: absolute;
        top: 58px;
        left: 0;
        right: 0;
        z-index: 3;
        display: flex;
        height: 36px;
        align-items: center;
        justify-content: center;
      }

      .back {
        position: absolute;
        left: 12px;
        top: 0;
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        background: transparent;
        line-height: 1;
        color: rgba(255, 255, 255, .94);
      }

      .nav-menu {
        width: 27px;
        height: 27px;
        filter: drop-shadow(0 1px 8px rgba(0, 0, 0, .06));
      }

      .route-title {
        max-width: calc(100vw - 112px);
        margin: 0;
        font-size: 21px;
        line-height: 1.15;
        font-weight: 680;
        color: rgba(255, 255, 255, .98);
        text-shadow: 0 1px 10px rgba(0, 0, 0, .08);
      }

      .date-pill {
        position: absolute;
        top: 101px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 3;
        height: 38px;
        width: 198px;
        padding: 3px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, .45);
        background: rgba(255, 255, 255, .055);
        display: flex;
        align-items: center;
        justify-content: stretch;
        gap: 2px;
        color: rgba(255, 255, 255, .95);
        text-shadow: 0 1px 8px rgba(0, 0, 0, .06);
      }

      .period-option {
        min-width: 0;
        height: 30px;
        flex: 1 1 0;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: rgba(255, 255, 255, .76);
        font-size: 14px;
        font-weight: 580;
        line-height: 30px;
        text-align: center;
      }

      .period-option[aria-selected="true"] {
        background: rgba(255, 255, 255, .2);
        color: #fff;
        font-weight: 680;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .16);
      }

      .period-option:focus-visible {
        outline: 2px solid rgba(255, 255, 255, .92);
        outline-offset: -2px;
      }

      .qr-watermark {
        position: absolute;
        right: 38px;
        top: 125px;
        z-index: 1;
        width: 76px;
        height: 76px;
        opacity: .12;
        background-image: url("./qr-watermark.svg");
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
      }

      .drawer-overlay {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 1000;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        visibility: hidden;
        pointer-events: none;
        background: rgba(18, 29, 22, .36);
        opacity: 0;
        transition: opacity 180ms ease, visibility 180ms ease;
      }

      .drawer-overlay.is-open {
        visibility: visible;
        pointer-events: auto;
        opacity: 1;
      }

      .drawer-panel {
        position: fixed;
        top: 0;
        bottom: auto;
        left: 0;
        display: flex;
        width: min(78vw, 350px);
        height: 100vh;
        height: 100dvh;
        min-height: 100%;
        max-height: 100%;
        min-width: 270px;
        flex-direction: column;
        padding: max(28px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
        border-radius: 0 18px 0 0;
        background: rgba(252, 254, 252, .985);
        box-shadow: 14px 0 38px rgba(11, 51, 27, .16);
        transform: translate3d(-104%, 0, 0);
        transition: transform 210ms cubic-bezier(.22, .8, .3, 1);
        overflow: hidden;
      }

      .drawer-overlay.is-open .drawer-panel {
        transform: translate3d(0, 0, 0);
      }

      .drawer-profile {
        display: flex;
        flex: 0 0 auto;
        align-items: center;
        gap: 14px;
        padding: 0 10px 24px;
      }

      .drawer-brand-mark {
        display: grid;
        width: 52px;
        height: 52px;
        flex: 0 0 52px;
        place-items: center;
        border-radius: 50%;
        color: #6fba82;
        background: #e4f3e8;
      }

      .drawer-brand-mark svg {
        width: 38px;
        height: 38px;
      }

      .drawer-name {
        color: #17221b;
        font-size: 18px;
        font-weight: 720;
      }

      .drawer-picker {
        display: flex;
        min-height: 0;
        flex: 1 1 auto;
        flex-direction: column;
        gap: 7px;
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .drawer-picker::-webkit-scrollbar {
        display: none;
      }

      .drawer-item {
        display: grid;
        width: 100%;
        min-height: 52px;
        grid-template-columns: 34px 1fr;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
        border-radius: 999px;
        color: #202a23;
        background: transparent;
        text-align: left;
        transition: color 130ms ease, background-color 130ms ease, transform 100ms ease;
      }

      .drawer-item:active {
        transform: scale(.985);
      }

      .drawer-item[aria-selected="true"] {
        color: #17803a;
        background: #e8f4eb;
      }

      .drawer-item-icon {
        width: 25px;
        height: 25px;
      }

      .drawer-item-label {
        font-size: 16px;
        font-weight: 620;
      }

      .drawer-footer {
        flex: 0 0 auto;
        margin-top: auto;
        padding: 18px 10px 0;
        border-top: 1px solid #e4eee7;
      }

      .drawer-close {
        display: flex;
        height: 40px;
        align-items: center;
        gap: 12px;
        color: #445048;
        background: transparent;
        font-size: 15px;
        font-weight: 600;
      }

      .drawer-close svg {
        width: 24px;
        height: 24px;
      }

      .drawer-version {
        margin-top: 7px;
        color: #9aa39d;
        font-size: 12px;
      }

      #collapsedScene {
        height: calc(100vh - var(--header-height) + var(--content-overlap));
        margin-top: calc(-1 * var(--content-overlap));
      }

      .content {
        position: relative;
        z-index: 3;
        padding-left: 0;
        padding-right: 0;
        padding-bottom: max(16px, env(safe-area-inset-bottom));
      }

      .collapsed-stack {
        display: flex;
        height: 100%;
        min-height: 0;
        flex-direction: column;
        contain: layout paint;
      }

      .scan-pull-zone {
        position: relative;
        z-index: 5;
        flex: 0 0 auto;
        touch-action: none;
      }

      .scan-bar {
        --scan-pull-ratio: 0;
        position: relative;
        z-index: 5;
        margin: 0 auto 16px;
        width: min(68vw, 240px);
        height: 44px;
        border-radius: 999px;
        border: 1px solid rgba(43, 137, 72, .10);
        background: #eef8f1;
        box-shadow:
          0 10px 24px rgba(31, 105, 57, .08),
          inset 0 0 0 1px rgba(255, 255, 255, .46);
        color: #17803a;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        font-size: 14px;
        font-weight: 600;
        flex: 0 0 auto;
        touch-action: none;
        transition: color 120ms ease, background-color 120ms ease, transform 120ms ease;
      }

      .scan-bar::before {
        content: "";
        position: absolute;
        top: 2px;
        right: 2px;
        bottom: 2px;
        left: 2px;
        z-index: 0;
        border-radius: 999px;
        background: #e5f3e9;
        box-shadow: inset 0 0 18px rgba(64, 152, 86, .055);
        pointer-events: none;
      }

      .scan-bar > * {
        position: relative;
        z-index: 1;
      }

      .scan-handle {
        margin: 0 auto 10px;
        width: 26px;
        height: 4px;
        border-radius: 999px;
        background: rgba(18, 53, 31, .18);
        flex: 0 0 auto;
      }

      .scan-icon {
        width: 20px;
        height: 20px;
      }

      .scan-arrow {
        width: 18px;
        height: 18px;
        transition: transform 120ms ease;
      }

      .scan-bar.is-pulling {
        transform: scale(1.015);
      }

      .scan-bar.is-pulling .scan-arrow {
        transform: translateY(3px);
      }

      .scan-bar.is-ready {
        color: #0f7134;
        background: #dff2e5;
      }

      .scan-bar.is-ready .scan-arrow {
        transform: rotate(180deg);
      }

      .expanded-content {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        top: var(--header-height);
        z-index: 3;
        display: grid;
        justify-items: center;
        align-items: start;
        padding: 0;
      }

      .expanded-stage {
        position: relative;
        display: grid;
        width: 100%;
        height: calc(100vh - var(--header-height));
        min-height: 0;
        place-items: center;
        contain: layout paint;
      }

      .expanded-sticker {
        display: block;
        width: 320px;
        max-width: calc(100vw - 96px);
        max-height: min(64vh, 500px);
        object-fit: contain;
        filter: drop-shadow(0 16px 32px rgba(33, 112, 59, .06));
      }

      .expanded-stage.has-route .expanded-sticker {
        display: none;
      }

      .board-white {
        position: relative;
        z-index: 4;
        display: flex;
        width: calc(100vw - 96px);
        max-width: var(--panel-max);
        min-height: clamp(420px, calc(100dvh - var(--header-height) - 145px), 640px);
        flex: 1 1 0;
        margin-left: auto;
        margin-right: auto;
        flex-direction: column;
        align-items: center;
        justify-content: stretch;
        gap: 8px;
        padding: 14px 12px 16px;
        border-radius: 19px;
        border: 1px solid rgba(0, 0, 0, .05);
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 1), rgba(255, 255, 255, .98) 46%, #fff 100%);
        box-shadow:
          0 18px 42px rgba(35, 112, 61, .09),
          0 4px 14px rgba(17, 55, 31, .035);
        overflow: hidden;
        contain: layout paint;
        touch-action: none;
      }

      .pdyy-chart-box {
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        width: 100%;
        height: 100%;
        min-height: 0;
        flex: 1 1 0;
        align-items: center;
        justify-items: center;
        padding-top: 16px;
        will-change: transform;
      }

      .pdyy-donut-svg {
        display: block;
        width: auto;
        max-width: 100%;
        height: 100%;
        min-height: 0;
        max-height: 370px;
        align-self: center;
        justify-self: center;
        aspect-ratio: 1;
        overflow: visible;
      }

      .pdyy-sep {
        stroke: #fff;
        stroke-width: 4.5;
        stroke-linecap: round;
      }

      .pdyy-legend-card {
        box-sizing: border-box;
        width: calc(100% - 18px);
        margin-top: 6px;
        padding: 12px 14px;
        border: 1px solid rgba(0, 0, 0, .04);
        border-radius: 20px;
        background: #fff;
        box-shadow:
          0 10px 24px rgba(20, 96, 48, .06),
          0 2px 8px rgba(0, 0, 0, .03);
      }

      .pdyy-legend-row {
        display: grid;
        grid-template-columns: 15px auto 1fr 30px 66px;
        height: 34px;
        align-items: center;
        column-gap: 10px;
        font-size: 15px;
      }

      .pdyy-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        box-shadow: 0 2px 6px rgba(0, 0, 0, .10);
      }

      .pdyy-dot-completed {
        background: #168a3d;
      }

      .pdyy-dot-remaining {
        background: #82d166;
      }

      .pdyy-label {
        color: #222;
        font-weight: 500;
        white-space: nowrap;
      }

      .pdyy-dash {
        height: 1px;
        border-top: 1px dashed #d7ddd8;
      }

      .pdyy-value {
        color: #16833b;
        font-size: 17px;
        font-weight: 900;
        text-align: right;
      }

      .pdyy-percent {
        color: #16833b;
        font-size: 15px;
        font-weight: 600;
        text-align: right;
        white-space: nowrap;
      }

      @media (max-width: 420px) {
        .pdyy-legend-card {
          width: 92%;
          padding: 12px 14px;
        }

        .pdyy-legend-row {
          height: 36px;
          column-gap: 8px;
          font-size: 14.5px;
        }

        .pdyy-dot {
          width: 13px;
          height: 13px;
        }

        .pdyy-value {
          min-width: 32px;
        }

        .pdyy-percent {
          font-size: 12.5px;
        }
      }

      .pull-text {
        width: 100%;
        height: 52px;
        border-radius: 18px;
        font-size: 15px;
        font-weight: 620;
        color: #17803a;
        background: #e5f3e9;
      }

      .scan-pill {
        height: 54px;
        border: 1px solid rgba(23, 128, 58, .10);
        border-radius: 999px;
        color: #17803a;
        background: rgba(245, 251, 247, .96);
        box-shadow:
          0 6px 16px rgba(24, 82, 39, .08),
          inset 0 0 0 2px rgba(219, 239, 226, .9);
        font-size: 16px;
        font-weight: 700;
      }

      .scan-handle {
        width: 30px;
        height: 6px;
        border-radius: 999px;
        background: rgba(120, 132, 123, .22);
      }

      .chart-card {
        width: 100%;
        padding: 18px 16px 16px;
        border: 1px solid rgba(0, 0, 0, .04);
        border-radius: 26px;
        background: #fff;
        box-shadow:
          0 10px 30px rgba(24, 82, 39, .08),
          0 2px 10px rgba(0, 0, 0, .03);
      }

      .chart-shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .chart-svg {
        display: block;
        width: 100%;
        max-width: 360px;
        aspect-ratio: 1;
        overflow: visible;
      }

      .chart-sep {
        stroke: #fff;
        stroke-width: 4.5;
        stroke-linecap: round;
      }

      .legend-card {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid rgba(0, 0, 0, .04);
        border-radius: 20px;
        background: #fff;
        box-shadow:
          0 10px 24px rgba(20, 96, 48, .06),
          0 2px 8px rgba(0, 0, 0, .03);
      }

      .legend-row {
        display: grid;
        grid-template-columns: 16px auto 1fr auto auto;
        height: 42px;
        align-items: center;
        column-gap: 10px;
        font-size: 15px;
      }

      .legend-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        box-shadow: 0 2px 6px rgba(0, 0, 0, .10);
      }

      .legend-dash {
        height: 1px;
        margin: 0 2px;
        border-top: 1px dashed #d7ddd8;
      }

      .legend-value {
        min-width: 26px;
        color: #17803a;
        font-size: 17px;
        font-weight: 800;
        text-align: right;
      }

      .legend-percent {
        min-width: 64px;
        color: #17803a;
        font-size: 15px;
        font-weight: 600;
        text-align: right;
      }

      .detail-bar {
        height: 54px;
        border-radius: 999px;
        color: #17803a;
        background: #e7f3ea;
        font-size: 16px;
        font-weight: 700;
      }

      .donut-title {
        fill: #666;
        font-size: 17px;
        font-weight: 800;
      }

      .donut-percent {
        fill: #17803a;
        font-size: 42px;
        font-weight: 900;
      }

      .slice-label {
        font-size: 16px;
        font-weight: 800;
      }

      .slice-value {
        font-size: 26px;
        font-weight: 900;
      }

      .bottom-cta {
        display: flex;
        width: calc(100vw - 96px);
        max-width: var(--panel-max);
        height: 92px;
        flex: 0 0 92px;
        margin-left: auto;
        margin-right: auto;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        color: #17803a;
      }

      .pull-arrow {
        width: 20px;
        height: 20px;
        flex: 0 0 20px;
      }

      html.low-performance .page {
        background: #f8fbf7;
      }

      html.low-performance .green-header {
        background: linear-gradient(135deg, #42b968 0%, #168140 100%);
      }

      html.low-performance .green-header::before {
        display: none;
      }

      html.low-performance .nav-menu,
      html.low-performance .expanded-sticker {
        filter: none;
      }

      html.low-performance .scan-bar,
      html.low-performance .scan-bar::before,
      html.low-performance .board-white,
      html.low-performance .pdyy-legend-card,
      html.low-performance .pdyy-dot,
      html.low-performance .pull-text {
        box-shadow: none;
      }

      html.low-performance .pdyy-chart-box {
        will-change: auto;
      }

      html.low-performance .header-primary,
      html.low-performance #collapsedScene,
      html.low-performance #expandedScene,
      html.low-performance .drawer-overlay,
      html.low-performance .drawer-panel {
        transition: none !important;
      }

      html.low-performance .drawer-panel {
        transform: none !important;
      }

      @media (prefers-reduced-motion: reduce) {
        .header-primary,
        #collapsedScene,
        #expandedScene {
          transition: none !important;
        }
      }

      @media (max-width: 430px) {
        :root {
          --side-gutter: 24px;
        }

        .board-white,
        .bottom-cta {
          width: calc(100vw - 48px);
        }
      }

      @media (max-height: 1100px) {
        .drawer-panel {
          width: min(82vw, 350px);
          min-width: 0;
          padding: max(16px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
          border-radius: 0 14px 0 0;
        }

        .drawer-profile {
          gap: 10px;
          padding: 0 8px 12px;
        }

        .drawer-brand-mark {
          width: 42px;
          height: 42px;
          flex-basis: 42px;
        }

        .drawer-brand-mark svg {
          width: 31px;
          height: 31px;
        }

        .drawer-item {
          min-height: 44px;
          grid-template-columns: 30px 1fr;
          gap: 9px;
          padding: 0 12px;
        }

        .drawer-item-icon {
          width: 22px;
          height: 22px;
        }

        .drawer-item-label {
          font-size: 15px;
        }

        .drawer-footer {
          padding: 10px 8px 0;
        }
      }

      @media (max-height: 760px) {
        .scan-handle {

    <script>
      function pdyyPolar(cx, cy, radius, angleDegrees) {
        const radians = (angleDegrees - 90) * Math.PI / 180;
        return {
          x: cx + radius * Math.cos(radians),
          y: cy + radius * Math.sin(radians)
        };
      }

      function pdyySetText(id, value) {
        const element = document.getElementById(id);
        if (element) element.textContent = value;
      }

      function normalizePdyyData(data) {
        const completedSource = data && data.completed && data.completed.count != null ? data.completed.count : data && data.completed_count;
        const pendingSource = data && data.pending && data.pending.count != null ? data.pending.count : data && data.remaining_count;
        const completedCount = Number(completedSource);
        const pendingCount = Number(pendingSource);
        const total = Number(data && data.total);
        if (!Number.isFinite(completedCount) || !Number.isFinite(pendingCount)) {
          return { completed_count: 0, remaining_count: 0 };
        }
        return {
          completed_count: Math.max(0, completedCount),
          remaining_count: Math.max(0, pendingCount),
          total: Number.isFinite(total) ? Math.max(0, total) : Math.max(0, completedCount) + Math.max(0, pendingCount)
        };
      }

      function pdyyRenderDonut(data) {
        data = normalizePdyyData(data);
        const completed = Math.max(0, Number(data.completed_count) || 0);
        const remaining = Math.max(0, Number(data.remaining_count) || 0);
        const total = completed + remaining;
        const percentText = document.getElementById("pdyyPercentText");
        const shadowLayer = document.getElementById("pdyySliceShadowLayer");
        const bodyLayer = document.getElementById("pdyySliceBodyLayer");
        const separatorLayer = document.getElementById("pdyySliceSeparatorLayer");
        if (!percentText || !shadowLayer || !bodyLayer || !separatorLayer) return;
        if (total <= 0) {
          pdyyRenderDonut({ completed_count: 1, remaining_count: 99 });
          if (percentText) percentText.textContent = "N/A";
          pdyySetText("pdyyCompletedText", "0");
          pdyySetText("pdyyCompletedPercentText", "(0.0%)");
          pdyySetText("pdyyRemainingText", "0");
          pdyySetText("pdyyRemainingPercentText", "(0.0%)");
          document.getElementById("pdyyDonutSvg").setAttribute("aria-label", "早餐状态饼图：暂无数据");
          return;
        }

        const completedPercent = completed / total * 100;
        const remainingPercent = remaining / total * 100;
        const svgNamespace = "http://www.w3.org/2000/svg";
        const slices = [
          { value: completed, fill: "url(#pdyyGradCompleted)" },
          { value: remaining, fill: "url(#pdyyGradRemaining)" }
        ];
        shadowLayer.innerHTML = "";
        bodyLayer.innerHTML = "";
        separatorLayer.innerHTML = "";
        let start = 0;

        slices.forEach(slice => {
          const sweep = slice.value / total * 360;
          if (slice.value > 0) {
            const pathData = detailDonutPath(195, 185, 162, 102, start + .85, start + sweep - .85);
            const shadow = document.createElementNS(svgNamespace, "path");
            shadow.setAttribute("d", pathData);
            shadow.setAttribute("fill", "#0f6f34");
            shadow.setAttribute("opacity", ".12");
            shadow.setAttribute("transform", "translate(0 7)");
            shadowLayer.appendChild(shadow);
            const body = document.createElementNS(svgNamespace, "path");
            body.setAttribute("d", pathData);
            body.setAttribute("fill", slice.fill);
            bodyLayer.appendChild(body);

            const innerPoint = pdyyPolar(195, 185, 100, start);
            const outerPoint = pdyyPolar(195, 185, 163, start);
            const separator = document.createElementNS(svgNamespace, "line");
            separator.setAttribute("class", "pdyy-sep");
            separator.setAttribute("x1", String(innerPoint.x));
            separator.setAttribute("y1", String(innerPoint.y));
            separator.setAttribute("x2", String(outerPoint.x));
            separator.setAttribute("y2", String(outerPoint.y));
            separatorLayer.appendChild(separator);
          }
          start += sweep;
        });

        document.getElementById("pdyyDonutSvg").setAttribute(
          "aria-label",
          `早餐状态饼图：已完成 ${completed}，剩余 ${remaining}`
        );
        percentText.textContent = `${completedPercent.toFixed(1)}%`;
        pdyySetText("pdyyCompletedText", String(completed));
        pdyySetText("pdyyCompletedPercentText", `(${completedPercent.toFixed(1)}%)`);
        pdyySetText("pdyyRemainingText", String(remaining));
        pdyySetText("pdyyRemainingPercentText", `(${remainingPercent.toFixed(1)}%)`);
      }

      function detailDonutPath(cx, cy, outerRadius, innerRadius, startAngle, endAngle) {
        const outerStart = pdyyPolar(cx, cy, outerRadius, startAngle);
        const outerEnd = pdyyPolar(cx, cy, outerRadius, endAngle);
        const innerEnd = pdyyPolar(cx, cy, innerRadius, endAngle);
        const innerStart = pdyyPolar(cx, cy, innerRadius, startAngle);
        const largeArc = endAngle - startAngle > 180 ? 1 : 0;
        return [
          `M ${outerStart.x} ${outerStart.y}`,
          `A ${outerRadius} ${outerRadius} 0 ${largeArc} 1 ${outerEnd.x} ${outerEnd.y}`,
          `L ${innerEnd.x} ${innerEnd.y}`,
          `A ${innerRadius} ${innerRadius} 0 ${largeArc} 0 ${innerStart.x} ${innerStart.y}`,
          "Z"
        ].join(" ");
      }

      function renderDetailDonut(data) {
        const svgNamespace = "http://www.w3.org/2000/svg";
        const slices = [
          { key: "Completed", label: "已完成", value: Math.max(0, Number(data.completed_count) || 0), fill: "url(#gradCompleted)", labelFill: "#fff" },
          { key: "Remaining", label: "剩余", value: Math.max(0, Number(data.remaining_count) || 0), fill: "url(#gradRemaining)", labelFill: "#fff" },
          { key: "Exception", label: "异常", value: Math.max(0, Number(data.exception_count) || 0), fill: "url(#gradException)", labelFill: "#fff" },
          { key: "Cancel", label: "取消", value: Math.max(0, Number(data.cancel_count) || 0), fill: "url(#gradCancel)", labelFill: "#333" }
        ];
        const total = slices.reduce((sum, slice) => sum + slice.value, 0);
        const shadowLayer = document.getElementById("sliceShadowLayer");
        const bodyLayer = document.getElementById("sliceBodyLayer");
        const separatorLayer = document.getElementById("sliceSeparatorLayer");
        const labelLayer = document.getElementById("sliceLabelLayer");
        if (!shadowLayer || !bodyLayer || !separatorLayer || !labelLayer || total <= 0) return;

        shadowLayer.innerHTML = "";
        bodyLayer.innerHTML = "";
        separatorLayer.innerHTML = "";
        labelLayer.innerHTML = "";
        let angle = 0;
        const gap = 2.2;

        slices.forEach(slice => {
          const sweep = slice.value / total * 360;
          const start = angle + gap / 2;
          const end = angle + sweep - gap / 2;
          const pathData = detailDonutPath(180, 170, 153, 88, start, end);
          const shadow = document.createElementNS(svgNamespace, "path");
          shadow.setAttribute("d", pathData);
          shadow.setAttribute("fill", "#0b6b2c");
          shadow.setAttribute("opacity", ".14");
          shadow.setAttribute("transform", "translate(0 6)");
          shadowLayer.appendChild(shadow);

          const body = document.createElementNS(svgNamespace, "path");
          body.setAttribute("d", pathData);
          body.setAttribute("fill", slice.fill);
          bodyLayer.appendChild(body);

          const lineStart = pdyyPolar(180, 170, 86, angle);
          const lineEnd = pdyyPolar(180, 170, 154, angle);
          const separator = document.createElementNS(svgNamespace, "line");
          separator.setAttribute("class", "chart-sep");
          separator.setAttribute("x1", String(lineStart.x));
          separator.setAttribute("y1", String(lineStart.y));
          separator.setAttribute("x2", String(lineEnd.x));
          separator.setAttribute("y2", String(lineEnd.y));
          separatorLayer.appendChild(separator);

          if (sweep >= 32) {
            const labelPoint = pdyyPolar(180, 170, 122, angle + sweep / 2);
            const label = document.createElementNS(svgNamespace, "text");
            label.setAttribute("x", String(labelPoint.x));
            label.setAttribute("y", String(labelPoint.y - 8));
            label.setAttribute("text-anchor", "middle");
            label.setAttribute("class", "slice-label");
            label.setAttribute("fill", slice.labelFill);
            label.textContent = slice.label;
            const value = document.createElementNS(svgNamespace, "text");
            value.setAttribute("x", String(labelPoint.x));
            value.setAttribute("y", String(labelPoint.y + 23));
            value.setAttribute("text-anchor", "middle");
            value.setAttribute("class", "slice-value");
            value.setAttribute("fill", slice.labelFill);
            value.textContent = String(slice.value);
            labelLayer.appendChild(label);
            labelLayer.appendChild(value);
          }

          const percent = slice.value / total * 100;
          pdyySetText(`legend${slice.key}Value`, String(slice.value));
          pdyySetText(`legend${slice.key}Percent`, `(${percent.toFixed(1)}%)`);
          angle += sweep;
        });

        pdyySetText("centerPercent", `${(slices[0].value / total * 100).toFixed(1)}%`);
      }

      const params = new URLSearchParams(location.search);
      const app = document.getElementById("app");
      const header = document.getElementById("header");
      const headerPrimary = document.getElementById("headerPrimary");
      const collapsedScene = document.getElementById("collapsedScene");
      const expandedScene = document.getElementById("expandedScene");
      const title = document.getElementById("title");
      const navIcon = document.getElementById("navIcon");
      const drawerOverlay = document.getElementById("drawerOverlay");
      const drawerPanel = document.getElementById("drawerPanel");
      const drawerClose = document.getElementById("drawerClose");
      const drawerItems = Array.from(document.querySelectorAll(".drawer-item[data-drawer-key]"));
      const periodButtons = Array.from(document.querySelectorAll(".period-option[data-period]"));
      document.body.appendChild(drawerOverlay);
      const scanPullZone = document.getElementById("scanPullZone");
      const scanButton = document.getElementById("scanButton");
      const scanLabel = document.getElementById("scanLabel");
      const firstSceneCard = document.getElementById("firstSceneCard");
      const firstSceneCardContent = firstSceneCard.querySelector(".pdyy-chart-box");
      const firstRoute = params.get("firstRoute") || "";
      const secondRoute = params.get("secondRoute") || "";
      const expandedStage = document.getElementById("expandedStage");
      const maxHeader = 190;
      const minHeader = 88;
      const deviceMemory = Number(navigator.deviceMemory || 0);
      const cpuCores = Number(navigator.hardwareConcurrency || 0);
      const lowPerformance =
        params.get("lowPerformance") === "1" ||
        (deviceMemory > 0 && deviceMemory <= 4) ||
        (cpuCores > 0 && cpuCores <= 4);
      document.documentElement.classList.toggle("low-performance", lowPerformance);
      let startY = 0;
      let sceneStartProgress = 0;
      let sceneLastY = 0;
      let sceneLastTime = 0;
      let sceneVelocity = 0;
      let progress = 0;
      let targetProgress = 0;
      let paintFrame = 0;
      let sceneSettleFrame = 0;
      let drawerOpen = false;
      let secondRouteStarted = false;
      let secondRouteFailed = false;
      let secondRouteNaVisible = false;
      let secondRouteRetryLoading = false;
      let secondRouteRetryTimer = 0;
      let nativeBrowserVisible = false;
      let selectedPeriod = "day";
      const firstRoutePeriods = new Map();
      let scannerStartY = 0;
      let scannerPull = 0;
      let scannerDragging = false;
      let scannerSettleFrame = 0;
      let suppressScanClickUntil = 0;

      let cardStartOffset = 0;

      function setDrawerOpen(open) {
        drawerOpen = Boolean(open);
        drawerOverlay.classList.toggle("is-open", drawerOpen);
        drawerOverlay.setAttribute("aria-hidden", drawerOpen ? "false" : "true");

      }

      function selectDrawerItem(selectedItem) {
        drawerItems.forEach(item => {
          item.setAttribute("aria-selected", item === selectedItem ? "true" : "false");
        });
        const key = selectedItem.dataset.drawerKey || "";

      }

      function routeLabel(route, fallback) {
        try {
          const url = new URL(route);
          return url.host || fallback;
        } catch (_error) {
          return fallback;
        }
      }

      function renderFirstRouteJson(raw) {
        try {
          const payload = JSON.parse(raw);
          const records = Array.isArray(payload) ? payload : [{ period: "day", ...payload }];
          firstRoutePeriods.clear();
          records.forEach(record => {
            if (!record || !["day", "month", "year"].includes(record.period)) return;
            firstRoutePeriods.set(record.period, record);
          });
          renderSelectedPeriod();
        } catch (_error) {
          firstRoutePeriods.clear();
          pdyyRenderDonut(null);
        }
      }

      function renderSelectedPeriod() {
        pdyyRenderDonut(firstRoutePeriods.get(selectedPeriod) || null);
      }

      function selectStatisticsPeriod(period, focusButton = false) {
        if (!["day", "month", "year"].includes(period)) return;
        selectedPeriod = period;
        periodButtons.forEach(button => {
          const selected = button.dataset.period === period;
          button.setAttribute("aria-selected", selected ? "true" : "false");
          button.tabIndex = selected ? 0 : -1;
          if (selected && focusButton) button.focus();
        });
        renderSelectedPeriod();
        document.dispatchEvent(new CustomEvent("uikitinsight:period-change", {
          detail: { period }
        }));
      }

      periodButtons.forEach((button, index) => {
        button.addEventListener("click", () => selectStatisticsPeriod(button.dataset.period));
        button.addEventListener("keydown", event => {
          if (!["ArrowLeft", "ArrowRight"].includes(event.key)) return;
          event.preventDefault();
          const offset = event.key === "ArrowRight" ? 1 : -1;
          const nextIndex = (index + offset + periodButtons.length) % periodButtons.length;
          selectStatisticsPeriod(periodButtons[nextIndex].dataset.period, true);
        });
      });

      async function loadFirstRouteDonut() {
        firstRoutePeriods.clear();
        pdyyRenderDonut(null);
        if (window.UIKitInsightRouteJson && typeof window.UIKitInsightRouteJson.loadFirstRouteJson === "function") {
          window.UIKitInsightRouteJson.loadFirstRouteJson();
          return;
        }
        if (!firstRoute) return;
        try {
          const response = await fetch(firstRoute, { cache: "no-store", headers: { "Accept": "application/json" } });
          renderFirstRouteJson(await response.text());
        } catch (_error) {
          pdyyRenderDonut(null);
        }
      }

      window.UIKitInsightReceiveFirstRouteJson = renderFirstRouteJson;

      function emitUIEvent(key, value) {
        if (window.UIKitInsightUIEvent && typeof window.UIKitInsightUIEvent.onMenuClick === "function") {
          window.UIKitInsightUIEvent.onMenuClick(key);
        }
        document.dispatchEvent(new CustomEvent("uikitinsight:menu-change", {
          detail: { key, value }
        }));
      }

      function paintScannerPull(value) {
        scannerPull = Math.max(0, Math.min(scannerPullMax, value));
        const headerHeight = maxHeader + scannerPull;
        app.style.setProperty("--header-height", `${headerHeight}px`);
        header.style.height = `${headerHeight}px`;
        header.style.setProperty("--header-height", `${headerHeight}px`);
        const ready = scannerPull >= scannerPullThreshold;
        scanButton.classList.toggle("is-pulling", scannerPull > 0);
        scanButton.classList.toggle("is-ready", ready);
        scanButton.setAttribute("aria-label", ready ? "松开打开扫码" : "下拉打开扫码");
        scanLabel.textContent = ready ? "松开打开扫码" : "下拉打开扫码";
      }

      function settleScannerPull(triggerScanner) {
        if (triggerScanner) emitUIEvent("openScanner", "下拉打开扫码");
        if (scannerSettleFrame) cancelAnimationFrame(scannerSettleFrame);
        const initialPull = scannerPull;
        if (lowPerformance || initialPull <= 0) {
          paintScannerPull(0);
          return;
        }
        const startedAt = performance.now();
        const duration = 190;
        const settle = now => {
          const elapsed = Math.min(1, (now - startedAt) / duration);
          const eased = 1 - Math.pow(1 - elapsed, 3);
          paintScannerPull(initialPull * (1 - eased));
          if (elapsed < 1) {
            scannerSettleFrame = requestAnimationFrame(settle);
          } else {
            scannerSettleFrame = 0;
            paintScannerPull(0);
          }
        };
        scannerSettleFrame = requestAnimationFrame(settle);
      }

      function paint(value) {
        progress = Math.max(0, Math.min(1, value));
        const headerHeight = maxHeader - (maxHeader - minHeader) * progress;
        app.style.setProperty("--header-height", `${headerHeight}px`);
        header.style.height = `${headerHeight}px`;
        header.style.setProperty("--header-height", `${headerHeight}px`);
        collapsedScene.style.opacity = String(1 - progress);
        expandedScene.style.opacity = String(progress);
        collapsedScene.style.visibility = progress >= .999 ? "hidden" : "visible";
        expandedScene.style.visibility = progress <= .001 ? "hidden" : "visible";
        collapsedScene.style.pointerEvents = progress < .5 ? "auto" : "none";
        expandedScene.style.pointerEvents = progress > .5 ? "auto" : "none";
        const headerPrimaryVisible = progress < 0.42;
        headerPrimary.style.opacity = headerPrimaryVisible ? String(1 - progress / 0.42) : "0";
        headerPrimary.style.visibility = headerPrimaryVisible ? "visible" : "hidden";
        headerPrimary.style.pointerEvents = headerPrimaryVisible ? "auto" : "none";
        title.textContent = progress < .5 ? "早餐状态拼图" : "嵌入式浏览器";
        setNativeBrowserVisible(
          progress >= .999 && !secondRouteNaVisible && secondRouteStarted
        );
      }

      function setNativeBrowserVisible(visible) {
        visible = Boolean(visible);
        if (nativeBrowserVisible === visible) return;
        nativeBrowserVisible = visible;
        if (window.UIKitInsightBrowser && typeof window.UIKitInsightBrowser.setVisible === "function") {
          window.UIKitInsightBrowser.setVisible(visible);
        }
      }

      function schedulePaint(value) {
        targetProgress = Math.max(0, Math.min(1, value));
        if (paintFrame) return;
        paintFrame = requestAnimationFrame(() => {
          paintFrame = 0;
          paint(targetProgress);
        });
      }

      function animateSceneTo(destination) {
        if (sceneSettleFrame) cancelAnimationFrame(sceneSettleFrame);
        const initialProgress = progress;
        if (destination === 1 && initialProgress <= .05) prepareSecondSceneForOpen();
        targetProgress = destination;
        if (lowPerformance || Math.abs(destination - initialProgress) < .001) {
          paint(destination);
          return;
        }
        const startedAt = performance.now();
        const duration = 220;
        const settle = now => {
          const elapsed = Math.min(1, (now - startedAt) / duration);
          const eased = 1 - Math.pow(1 - elapsed, 3);
          paint(initialProgress + (destination - initialProgress) * eased);
          if (elapsed < 1) {
            sceneSettleFrame = requestAnimationFrame(settle);
          } else {
            sceneSettleFrame = 0;
            paint(destination);
          }
        };
        sceneSettleFrame = requestAnimationFrame(settle);
      }

      function maxCardLift() {
        const cardRect = firstSceneCard.getBoundingClientRect();
        const contentRect = firstSceneCardContent.getBoundingClientRect();
        const unshiftedContentBottom = contentRect.bottom - cardOffset;
        return Math.max(0, unshiftedContentBottom - cardRect.bottom + 14);
      }

      function paintCardOffset(value) {
        const limit = maxCardLift();
        cardOffset = Math.max(-limit, Math.min(0, value));
        firstSceneCardContent.style.transform = `translate3d(0, ${cardOffset}px, 0)`;
      }

      function animateCardTo(destination) {
        if (cardSettleFrame) cancelAnimationFrame(cardSettleFrame);
        const initialOffset = cardOffset;
        const target = Math.max(-maxCardLift(), Math.min(0, destination));
        if (lowPerformance || Math.abs(target - initialOffset) < .5) {
          paintCardOffset(target);
          return;
        }
        const startedAt = performance.now();
        const duration = 210;
        const settle = now => {
          const elapsed = Math.min(1, (now - startedAt) / duration);
          const eased = 1 - Math.pow(1 - elapsed, 3);
          paintCardOffset(initialOffset + (target - initialOffset) * eased);
          if (elapsed < 1) {
            cardSettleFrame = requestAnimationFrame(settle);
          } else {
            cardSettleFrame = 0;
            paintCardOffset(target);
          }
        };
        cardSettleFrame = requestAnimationFrame(settle);
      }

      function bindVerticalGesture(element, handlers) {
        if ("PointerEvent" in window) {
          let activePointer = null;
          element.addEventListener("pointerdown", event => {
            if (event.pointerType === "mouse" && event.button !== 0) return;
            if (handlers.start(event.clientY, event) === false) return;
            activePointer = event.pointerId;
            if (element.setPointerCapture) element.setPointerCapture(activePointer);
          });
          element.addEventListener("pointermove", event => {
            if (event.pointerId !== activePointer) return;
            handlers.move(event.clientY, event);
          });
          const finish = (event, cancelled) => {
            if (event.pointerId !== activePointer) return;
            activePointer = null;
            handlers.end(event.clientY, event, cancelled);
          };
          element.addEventListener("pointerup", event => finish(event, false));
          element.addEventListener("pointercancel", event => finish(event, true));
          return;
        }

        let activeTouch = false;
        element.addEventListener("touchstart", event => {
          if (!event.touches.length || handlers.start(event.touches[0].clientY, event) === false) return;
          activeTouch = true;
        }, { passive: false });
        element.addEventListener("touchmove", event => {
          if (!activeTouch || !event.touches.length) return;
          handlers.move(event.touches[0].clientY, event);
        }, { passive: false });
        const finish = (event, cancelled) => {
          if (!activeTouch) return;
          activeTouch = false;
          const touch = event.changedTouches && event.changedTouches[0];
          handlers.end(touch ? touch.clientY : 0, event, cancelled);
        };
        element.addEventListener("touchend", event => finish(event, false), { passive: false });
        element.addEventListener("touchcancel", event => finish(event, true), { passive: false });
      }

      bindVerticalGesture(scanPullZone, {
        start(y, event) {
          event.stopPropagation();
          if (progress > .05) return false;
          if (scannerSettleFrame) cancelAnimationFrame(scannerSettleFrame);
          scannerSettleFrame = 0;
          scannerDragging = true;
          scannerStartY = y;
          return true;
        },
        move(y, event) {
          event.stopPropagation();
          if (!scannerDragging) return;
          const delta = Math.max(0, y - scannerStartY);
          if (delta > 3) event.preventDefault();
          paintScannerPull(delta * .72);
        },
        end(_y, event, cancelled) {
          event.stopPropagation();
          if (!scannerDragging) return;
          scannerDragging = false;
          const shouldOpen = !cancelled && scannerPull >= scannerPullThreshold;
          if (scannerPull > 3) suppressScanClickUntil = Date.now() + 450;
          settleScannerPull(shouldOpen);
        }
      });

      bindVerticalGesture(firstSceneCard, {
        start(y, event) {
          event.stopPropagation();
          if (progress > .05) return false;
          if (cardSettleFrame) cancelAnimationFrame(cardSettleFrame);
          cardSettleFrame = 0;
          cardDragging = true;
          cardStartY = y;
          cardLastY = y;
          cardLastTime = performance.now();
          cardStartOffset = cardOffset;
          cardVelocity = 0;
          return true;
        },
        move(y, event) {
          event.stopPropagation();
          if (!cardDragging) return;
          const now = performance.now();
          const elapsed = Math.max(1, now - cardLastTime);
          cardVelocity = (y - cardLastY) / elapsed;
          cardLastY = y;
          cardLastTime = now;
          if (Math.abs(y - cardStartY) > 2) event.preventDefault();
          paintCardOffset(cardStartOffset + y - cardStartY);
        },
        end(_y, event, cancelled) {
          event.stopPropagation();
          if (!cardDragging) return;
          cardDragging = false;
          const limit = maxCardLift();
          const revealBottom = !cancelled && (cardVelocity < -.12 || cardOffset < -limit * .35);
          animateCardTo(revealBottom ? -limit : 0);
        }
      });

      navIcon.setAttribute("aria-haspopup", "dialog");
      navIcon.setAttribute("aria-expanded", "false");
      navIcon.addEventListener("click", event => {
        event.stopPropagation();
        setDrawerOpen(true);
      });

      drawerClose.addEventListener("click", () => setDrawerOpen(false));
      drawerOverlay.addEventListener("click", event => {
        if (event.target === drawerOverlay) setDrawerOpen(false);
      });
      drawerItems.forEach(item => {
        item.addEventListener("click", () => selectDrawerItem(item));
      });
      scanButton.addEventListener("click", event => {
        event.stopPropagation();
        if (Date.now() < suppressScanClickUntil) return;
        emitUIEvent("openScanner", "下拉打开扫码");
      });
      ["touchstart", "touchmove", "touchend", "touchcancel"].forEach(eventName => {
        drawerOverlay.addEventListener(eventName, event => {
          event.stopPropagation();
        }, { passive: true });
      });
      document.addEventListener("keydown", event => {
        if (event.key === "Escape" && drawerOpen) setDrawerOpen(false);
      });

      bindVerticalGesture(app, {
        start(y, event) {
          if (drawerOpen || event.target.closest("#drawerOverlay, #scanPullZone, #firstSceneCard, #navIcon, .date-pill")) {
            return false;
          }
          if (sceneSettleFrame) cancelAnimationFrame(sceneSettleFrame);
          sceneSettleFrame = 0;
          startY = y;
          sceneLastY = y;
          sceneLastTime = performance.now();
          sceneStartProgress = progress;
          sceneVelocity = 0;
          return true;
        },
        move(y, event) {
          const now = performance.now();
          const elapsed = Math.max(1, now - sceneLastTime);
          sceneVelocity = (sceneLastY - y) / elapsed;
          sceneLastY = y;
          sceneLastTime = now;
          if (Math.abs(y - startY) > 2) event.preventDefault();
          if (sceneStartProgress <= .05 && y < startY - 2) prepareSecondSceneForOpen();
          schedulePaint(sceneStartProgress + (startY - y) / 420);
        },
        end(_y, _event, cancelled) {
          if (paintFrame) {
            cancelAnimationFrame(paintFrame);
            paintFrame = 0;
            paint(targetProgress);
          }
          const openSecondScene = !cancelled && (sceneVelocity > .18 || progress > .5);
          const returnFirstScene = !cancelled && sceneVelocity < -.18;
          animateSceneTo(returnFirstScene ? 0 : openSecondScene ? 1 : progress >= .5 ? 1 : 0);
        }
      });

      document.getElementById("expandButton").addEventListener("click", () => animateSceneTo(1));
      window.pdyyRenderDonut = pdyyRenderDonut;
      window.renderBreakfastDonut = pdyyRenderDonut;
      function clearSecondRouteRetry() {
        if (!secondRouteRetryTimer) return;
        clearTimeout(secondRouteRetryTimer);
        secondRouteRetryTimer = 0;
      }

      function scheduleSecondRouteRetry() {
        clearSecondRouteRetry();
        if (!secondRouteNaVisible || !secondRoute) return;
        secondRouteRetryTimer = window.setTimeout(retrySecondRoute, secondRouteRetryDelay);
      }

      function retrySecondRoute() {
        secondRouteRetryTimer = 0;
        if (!secondRouteNaVisible || !secondRoute) return;
        secondRouteFailed = false;
        secondRouteRetryLoading = true;
        if (window.UIKitInsightBrowser && typeof window.UIKitInsightBrowser.retry === "function") {
          window.UIKitInsightBrowser.retry();
        } else {
          markSecondRouteFailed();
        }
      }

      function showSecondRouteNA() {
        if (!secondRouteNaVisible) {
          secondRouteNaVisible = true;
          secondRouteRetryLoading = false;
          if (expandedStage) expandedStage.classList.remove("has-route");
          setNativeBrowserVisible(false);
          if (window.UIKitInsightBrowser && typeof window.UIKitInsightBrowser.showNA === "function") {
            window.UIKitInsightBrowser.showNA();
          }
        }
        scheduleSecondRouteRetry();
      }

      function markSecondRouteFailed() {
        secondRouteFailed = true;
        secondRouteRetryLoading = false;
        showSecondRouteNA();
      }

      function markSecondRouteLoaded() {
        secondRouteFailed = false;
        secondRouteRetryLoading = false;
        secondRouteNaVisible = false;
        clearSecondRouteRetry();
        if (expandedStage) expandedStage.classList.add("has-route");
        setNativeBrowserVisible(progress >= .999);
      }

      function prepareSecondSceneForOpen() {
        if (secondRouteFailed) {
          showSecondRouteNA();
          return;
        }
        if (secondRouteStarted || !secondRoute) return;
        secondRouteStarted = true;
        if (window.UIKitInsightBrowser && typeof window.UIKitInsightBrowser.prepare === "function") {
          window.UIKitInsightBrowser.prepare();
        } else {
          markSecondRouteFailed();
        }
      }

      window.UIKitInsightMarkSecondRouteFailed = markSecondRouteFailed;
      window.UIKitInsightMarkSecondRouteLoaded = markSecondRouteLoaded;
      window.UIKitInsightShowSecondRouteNA = showSecondRouteNA;
      window.UIKitInsightShowFirstScene = function () { animateSceneTo(0); };
      loadFirstRouteDonut();

      paint(0);
    </script>
  </body>
</html>
